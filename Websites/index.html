<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chairman Worldwide</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0A0A0A;
  color: #FFFFFF;
  font-family: 'Inter', sans-serif;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 30px 60px;
  font-size: 14px;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 30px;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  padding: 120px 60px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  line-height: 0.95;
  letter-spacing: -1px;
}

.hero p {
  margin-top: 30px;
  font-size: 18px;
  opacity: 0.7;
}

/* SUB BRANDS */
.brands {
  padding: 120px 60px;
}

.brand {
  font-size: 28px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.brand:hover {
  opacity: 1;
}

/* STATEMENT */
.statement {
  padding: 120px 60px;
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  line-height: 1.2;
  max-width: 700px;
}

/* FOOTER */
footer {
  padding: 60px;
  font-size: 14px;
  opacity: 0.5;
}
</style>
</head>

<body>

<nav>
  <div>CHAIRMAN WORLDWIDE</div>
  <div>
    <a href="#">Work</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>
    CHAIRMAN<br>
    WORLDWIDE
  </h1>
  <p>Media. Film. Culture.</p>
</section>

<section class="brands">
  <div class="brand">Icarus Filmworks</div>
  <div class="brand">Frequency Black</div>
  <div class="brand">Fandamonium</div>
</section>

<section class="statement">
  We build platforms, tell stories, and move culture.
</section>

<footer>
  © Chairman Worldwide
</footer>

</body>
</html>
